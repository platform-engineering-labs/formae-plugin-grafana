name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_conformance:
        description: 'Run conformance tests'
        required: false
        default: 'false'
        type: boolean
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build
        run: make build

      - name: Test
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Validate Pkl schemas
        run: |
          pkl eval formae-plugin.pkl --format json > /dev/null
          echo "Manifest validated successfully"

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Verify schema
        run: make verify-schema

  integration-tests:
    needs: [build, lint]
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Run integration tests
        run: make test-integration

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  # Discover test cases for the conformance matrix.
  discover-conformance-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.run_conformance == 'true'
    outputs:
      test-cases: ${{ steps.discover.outputs.test-cases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover test cases
        id: discover
        run: |
          TEST_CASES=$(ls testdata/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Discovered test cases: ${TEST_CASES}"
          echo "test-cases=${TEST_CASES}" >> "$GITHUB_OUTPUT"

  pre-cleanup:
    needs: [discover-conformance-tests]
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Clean test resources
        run: ./scripts/ci/clean-environment.sh

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  # Conformance tests run against a local Grafana instance via Docker Compose.
  # Runs each test case sequentially to avoid shared-state conflicts.
  conformance-tests:
    needs: [discover-conformance-tests, pre-cleanup]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover-conformance-tests.outputs.test-cases) }}
      max-parallel: 1
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Install plugin
        run: make install

      - name: Run conformance test (${{ matrix.test-case }})
        env:
          FORMAE_TEST_RUN_ID: ci-${{ github.run_id }}-${{ matrix.test-case }}
        run: |
          VERSION="${{ inputs.formae_version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "latest" ]; then
            VERSION="latest"
          fi
          make conformance-test-crud TEST=${{ matrix.test-case }} VERSION="$VERSION"

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  post-cleanup:
    needs: [conformance-tests]
    if: always()
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Clean test resources
        run: ./scripts/ci/clean-environment.sh

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down
