name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_conformance:
        description: 'Run conformance tests'
        required: false
        default: 'false'
        type: boolean
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build
        run: make build

      - name: Test
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Validate Pkl schemas
        run: |
          pkl eval formae-plugin.pkl --format json > /dev/null
          echo "Manifest validated successfully"

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Verify schema
        run: make verify-schema

  integration-tests:
    needs: [build, lint]
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Run integration tests
        run: make test-integration

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  # Discover test cases for the conformance matrix.
  discover-conformance-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.run_conformance == 'true'
    outputs:
      test-cases: ${{ steps.discover.outputs.test-cases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Discover test cases
        id: discover
        run: |
          TEST_CASES=$(ls testdata/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Discovered test cases: ${TEST_CASES}"
          echo "test-cases=${TEST_CASES}" >> "$GITHUB_OUTPUT"

  pre-cleanup:
    needs: [discover-conformance-tests]
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Clean test resources
        run: ./scripts/ci/clean-environment.sh

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  # Build formae and the plugin once, then share both via artifact across the
  # conformance matrix. Previously each matrix job re-downloaded formae via
  # orbital and re-ran `make install`, costing ~60-90s per job; with
  # max-parallel: 1 and N test cases that compounded. Mirrors the build-once
  # pattern in formae-plugin-azure's nightly.
  build-and-install:
    needs: [discover-conformance-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build formae
        run: |
          # CI today defaults to the latest published orbital release. There's no
          # GitHub release with a downloadable binary, so we build from the
          # matching source tag to get a binary we can artifact across matrix
          # jobs. Honors the same formae_version input the matrix step did, with
          # "latest" → newest tag (including dev tags, to mirror nightly).
          INPUT_VERSION="${{ inputs.formae_version }}"
          git clone --depth 1 https://github.com/platform-engineering-labs/formae.git /tmp/formae
          cd /tmp/formae
          git fetch --tags
          if [ -z "$INPUT_VERSION" ] || [ "$INPUT_VERSION" = "latest" ]; then
            LATEST_TAG=$(git tag -l "[0-9]*" --sort=-version:refname | head -1)
            VERSION=$(echo "$LATEST_TAG" | cut -d'-' -f1)
            echo "No formae_version input; latest tag=${LATEST_TAG}, using canonical VERSION=${VERSION}"
            git checkout "$LATEST_TAG"
          else
            VERSION="$INPUT_VERSION"
            echo "Using formae_version input: ${VERSION}"
            git checkout "$VERSION" || git checkout "v$VERSION"
          fi
          echo "Building formae with VERSION=${VERSION}"
          make build VERSION="${VERSION}"
          /tmp/formae/formae --version
          mkdir -p /tmp/formae-install/bin /tmp/formae-install/.ops
          touch /tmp/formae-install/.ops/.keep
          cp /tmp/formae/formae /tmp/formae-install/bin/formae

      - name: Install plugin
        run: make install

      - name: Upload formae binary
        uses: actions/upload-artifact@v4
        with:
          name: formae-install
          path: /tmp/formae-install
          include-hidden-files: true
          retention-days: 1

      - name: Upload installed plugin tree
        uses: actions/upload-artifact@v4
        with:
          name: plugin-installed
          path: ~/.pel/formae/plugins/
          retention-days: 1

  # Conformance tests run against a local Grafana instance via Docker Compose.
  # Runs each test case sequentially to avoid shared-state conflicts.
  conformance-tests:
    needs: [discover-conformance-tests, pre-cleanup, build-and-install]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover-conformance-tests.outputs.test-cases) }}
      max-parallel: 1
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Download formae binary
        uses: actions/download-artifact@v8
        with:
          name: formae-install
          path: /tmp/formae-install

      - name: Download installed plugin tree
        uses: actions/download-artifact@v8
        with:
          name: plugin-installed
          path: ~/.pel/formae/plugins/

      - name: Set up formae binary
        run: |
          test -d /tmp/formae-install/.ops
          chmod +x /tmp/formae-install/bin/formae
          echo "FORMAE_BINARY=/tmp/formae-install/bin/formae" >> $GITHUB_ENV
          /tmp/formae-install/bin/formae --version

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Run conformance test (${{ matrix.test-case }})
        env:
          FORMAE_TEST_RUN_ID: ci-${{ github.run_id }}-${{ matrix.test-case }}
        run: make conformance-test-crud TEST=${{ matrix.test-case }}

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  post-cleanup:
    needs: [conformance-tests]
    if: always()
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Clean test resources
        run: ./scripts/ci/clean-environment.sh

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down
