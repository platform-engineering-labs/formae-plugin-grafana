name: Nightly

# Tests plugin against formae main branch to catch SDK regressions before release.

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC
  workflow_dispatch:
    inputs:
      formae_branch:
        description: "Formae branch to build from (default: main)"
        required: false
        default: "main"
        type: string
      formae_version:
        description: |
          Formae version baked into the binary via VERSION (also propagated to
          plugins as FORMAE_VERSION; plugins use it to resolve their PKL formae
          schema dep against package://...formae@<version>). Defaults to the
          canonical X.Y.Z derived from the latest tag on the formae branch —
          including dev tags, so a newly tagged 0.86.0-dev.N is picked up
          automatically. Set this explicitly to test an unreleased schema that
          has been pre-released via formae's schema-prerelease workflow but has
          no matching tag yet (e.g. formae_version=0.86.0 while 0.85.2 is the
          latest tag).
        required: false
        default: ""
        type: string

concurrency:
  group: grafana-conformance-tests
  cancel-in-progress: false

jobs:
  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      test-cases: ${{ steps.discover.outputs.test-cases }}
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Discover test cases
        id: discover
        run: |
          TEST_CASES=$(ls testdata/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Discovered test cases: ${TEST_CASES}"
          echo "test-cases=${TEST_CASES}" >> "$GITHUB_OUTPUT"

  pre-cleanup:
    needs: [discover-tests]
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Clean test resources
        run: ./scripts/ci/clean-environment.sh

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  # Build formae once and share the binary + source across the conformance
  # matrix. Per-matrix-job builds were spending ~2 minutes each cloning and
  # compiling formae; this folds that into a single job and downloads via
  # artifacts. Mirrors the pattern in formae-plugin-azure's nightly.
  build-formae:
    needs: [discover-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build formae
        run: |
          BRANCH="${{ inputs.formae_branch || 'main' }}"
          echo "Building formae from branch: ${BRANCH}"
          git clone --branch "${BRANCH}" --depth 1 https://github.com/platform-engineering-labs/formae.git /tmp/formae
          cd /tmp/formae
          git fetch --tags
          # The version baked via VERSION becomes formae.Version at runtime and
          # is propagated to plugins as FORMAE_VERSION. Plugins use it to resolve
          # their formae PKL dep against package://...formae@<version> on the
          # hub, so it must match a schema that has been published. The nightly
          # validates plugin main against formae main, so we pick the latest tag
          # on the branch — including dev tags — since that is the most recent
          # published schema. The canonical X.Y.Z is stripped from any -dev.N
          # suffix to match how formae publishes schemas (a 0.86.0-dev.N release,
          # and the schema-prerelease workflow, both publish at formae@0.86.0).
          # An explicit formae_version input overrides this — use it to test an
          # unreleased, pre-released schema that has no matching tag yet.
          VERSION="${{ inputs.formae_version }}"
          if [ -z "$VERSION" ]; then
            LATEST_TAG=$(git tag -l "[0-9]*" --sort=-version:refname | head -1)
            VERSION=$(echo "$LATEST_TAG" | cut -d'-' -f1)
            echo "No formae_version input; latest tag=${LATEST_TAG}, using canonical VERSION=${VERSION}"
          else
            echo "Using formae_version input: ${VERSION}"
          fi
          echo "Building formae with VERSION=${VERSION}"
          make build VERSION="${VERSION}"
          /tmp/formae/formae --version
          mkdir -p /tmp/formae-install/bin /tmp/formae-install/.ops
          touch /tmp/formae-install/.ops/.keep
          cp /tmp/formae/formae /tmp/formae-install/bin/formae

      - name: Upload formae install tree
        uses: actions/upload-artifact@v4
        with:
          name: formae-install
          path: /tmp/formae-install
          include-hidden-files: true
          retention-days: 1

      - name: Upload formae source (for replace directives + Makefile lookup)
        uses: actions/upload-artifact@v4
        with:
          name: formae-source
          path: /tmp/formae
          retention-days: 1

  conformance-tests:
    needs: [discover-tests, pre-cleanup, build-formae]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover-tests.outputs.test-cases) }}
      max-parallel: 1
      fail-fast: false

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Download formae install tree
        uses: actions/download-artifact@v4
        with:
          name: formae-install
          path: /tmp/formae-install

      - name: Download formae source
        uses: actions/download-artifact@v4
        with:
          name: formae-source
          path: /tmp/formae

      - name: Set up formae binary
        run: |
          test -d /tmp/formae-install/.ops
          chmod +x /tmp/formae-install/bin/formae
          echo "FORMAE_BINARY=/tmp/formae-install/bin/formae" >> $GITHUB_ENV
          /tmp/formae-install/bin/formae --version

      # Temporary: until Orbital package manager handles plugin version
      # coordination, the formae Makefile is the source of truth for which
      # plugin branch to build against. Parse the @ref suffix and check
      # out that ref so the plugin is compatible with the formae binary.
      - name: Align plugin branch with formae Makefile
        run: |
          PLUGIN_NAME=$(basename "${{ github.repository }}")
          REF=$(grep "${PLUGIN_NAME}" /tmp/formae/Makefile \
            | grep -o '@[^[:space:]\\]*' \
            | head -1 \
            | sed 's/^@//')
          if [ -n "$REF" ]; then
            echo "Formae Makefile pins ${PLUGIN_NAME} to ref: ${REF}"
            git fetch origin "${REF}"
            git checkout "${REF}"
          else
            echo "No ref override for ${PLUGIN_NAME}, staying on default branch"
          fi

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Inject formae replace directives
        run: |
          FORMAE_SRC=/tmp/formae
          for pkg in pkg/auth pkg/model pkg/plugin pkg/plugin-conformance-tests; do
            if grep -q "formae/$pkg" go.mod 2>/dev/null; then
              echo "Injecting replace for $pkg -> $FORMAE_SRC/$pkg"
              go mod edit -replace "github.com/platform-engineering-labs/formae/$pkg=$FORMAE_SRC/$pkg"
            fi
          done
          go mod tidy

      - name: Install plugin
        run: make install

      - name: Run conformance test (${{ matrix.test-case }})
        env:
          FORMAE_TEST_RUN_ID: nightly-main-${{ github.run_id }}-${{ matrix.test-case }}
        run: make conformance-test-crud TEST=${{ matrix.test-case }}

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  post-cleanup:
    needs: [conformance-tests]
    if: always()
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: http://localhost:3333
      GRAFANA_AUTH: admin:admin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Start Grafana test instance
        run: make test-env-up

      - name: Clean test resources
        run: ./scripts/ci/clean-environment.sh

      - name: Stop Grafana test instance
        if: always()
        run: make test-env-down

  notify-fixed:
    needs: [conformance-tests, post-cleanup]
    runs-on: ubuntu-latest
    if: success()
    continue-on-error: true
    steps:
      - name: Check if previous run failed
        id: check_previous
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly.yml',
              per_page: 2,
              status: 'completed'
            });
            const previousRun = runs.data.workflow_runs.find(run => run.id !== context.runId);
            if (previousRun && previousRun.conclusion === 'failure') {
              return 'true';
            }
            return 'false';
          result-encoding: string

      - name: Notify Slack (Fixed)
        if: steps.check_previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: Nightly fixed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Nightly fixed* on `${{ github.repository }}`\n\nPlugin conformance tests now passing against formae main branch."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  notify-failure:
    needs: [conformance-tests, post-cleanup]
    runs-on: ubuntu-latest
    if: failure()
    continue-on-error: true
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":warning: Nightly build failed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *Nightly build failed* on `${{ github.repository }}`\n\nPlugin conformance tests failed against formae main branch. This may indicate an SDK regression."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
